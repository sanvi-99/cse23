<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>array</title>
</head>
<body>
    <script>
        let num=[3,4,6,8,9,10,18,19,24];

        console.log(num.lastIndexOf(19));
        console.log(num.length);
        //remove last element from array
        console.log(num.pop());
        console.log("updated array " + num);
        //add element in the last of array
        console.log(num.push(30));
        console.log(num.shift());
        console.log(num.unshift(90));



    </script>
</body>
</html>
