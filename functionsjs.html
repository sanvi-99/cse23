<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //function:-block of code,used or defined to perform specific
        //types of function
        //normal function:-with para,without paraand with default

        //normal function without parameters..
        function demo(){
            console.log("hello JS");
        }
        demo();

        function demo1(text){
            console.log("hello" + text);
        }
        demo1("react");
        //default parameters
        function add(a,b){
            console.log("addition is " + (a+b));
        }
        add(12,14);

        //synchronous operations
        function cal(){
            function add(a,b){
                console.log(a+b);
            }function mul(x,y){
                console.log(x*y);
            }function sub(p,r){
                console.log(p-r);
            }
            add(9,7);
            mul(8,9);
            sub(7,19);
        }
        cal();
        //anonymous functions
        let msg=function(){
            console.log("hello ABES");
            console.log(typeof(msg));
        }
        msg();
        //short code for above function(arrow function)
        let msg1=()=>console.log("hello ABES");
        msg1();
        //arrowfunction using multiple lines

        let msg2=(a,b)=>{
            var num1=a;
            var num2=b;
            var res=num1/num2;
            console.log("result is "+ res);
        }
        msg(20,65);

        //IIFE
        (function(){
            console.log("hello world");
        })();
        (msg=>console.log("hello world"))();


        //promises

        let myPromise=new Promise(function(resolve,reject){
            let age=24;
            if(age>=18){
                resolve("valid age");
            }
            else{
                reject("wait for next year");
            }
        });
        myPromise.then(msg=>console.log(msg)).catch(error=>console.log(error));

        //async and await

        //api...
        async function userInfo(){
            try{
        let userData= await fetch('https://dummyjson.com/products');
        let response=await userData.json();
        console.log(response);
            } //try end
            catch(error){
                console.log(error);
            }// catch end
        }//functione end
        userInfo();

        //higher order function
        //map filter reduce

        let num=[4,1,5,7,8,9,10,17,18,19];
        //map
        let square=num.map(n=>n*n);
        console.log(square);
        //reduce
        let sum=num.reduce((total,n)=>total+n);
        console.log(sum);
        //filter
        let sorting=num.filter(n=>n>2);
        console.log(sorting);
        //for each
        num.forEach(n=>console.log(n*2));


        //local storage
        let myInfo={
            name:'sanvi singh',
            age:19,
            email:"sanvisingh992006@gmail.com",
            mobileNo:8882264611,
        };
        //store the object by converting it into a JSON string
        localStorage.setItem('myInfo',JSON.stringify(myInfo));
    
        //retrieve and parse the JSON string back into an object
        let storeData=JSON.parse(localStorage.getItem('myInfo'));
        console.log(storeData.mobileNo);
        

                    </script>
</body>
</html>
